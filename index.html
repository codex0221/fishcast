<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FishCast • Pro Fishing Intelligence</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    body { font-family: system-ui; }
    #map { height: 420px; border-radius: 1.5rem; overflow: hidden; }
  </style>
</head>

<body class="bg-zinc-950 text-white min-h-screen pb-12">
<div class="max-w-xl mx-auto px-4">

  <header class="py-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold">🎣 FishCast Pro</h1>
    <button onclick="getLocation()" class="bg-emerald-600 px-4 py-2 rounded-xl text-sm">
      My Location
    </button>
  </header>

  <div id="map"></div>

  <div class="flex gap-2 mt-3 text-xs">
    <button onclick="toggleRadar()" id="radar-btn" class="flex-1 bg-emerald-600 py-2 rounded-xl">
      Show Radar
    </button>
    <button onclick="saveSpot()" class="flex-1 bg-zinc-700 py-2 rounded-xl">
      Save Spot
    </button>
  </div>

  <div class="mt-6 flex gap-2">
    <input id="search-input" class="flex-1 bg-zinc-900 px-4 py-3 rounded-xl" placeholder="Search location..."/>
    <button onclick="searchLocation()" class="bg-white text-black px-4 rounded-xl">Go</button>
  </div>

  <div id="search-results" class="mt-2"></div>

  <div id="current-weather" class="mt-6 bg-zinc-900 p-6 rounded-3xl"></div>
  <div id="fishing-activity" class="mt-6 bg-zinc-900 p-6 rounded-3xl"></div>
  <div id="species-panel" class="mt-6 bg-zinc-900 p-6 rounded-3xl"></div>
  <div id="decision-panel" class="mt-6 p-6 rounded-3xl text-center"></div>

</div>

<script>
let lat = 33.75;
let lon = -84.39;
let currentPlaceName = "Atlanta";

let map;
let radarLayer;

let savedSpots = [];

const hotspots = [
  {lat: 34.15, lon: -84.05, name: "Lake Lanier"},
  {lat: 34.05, lon: -84.70, name: "Lake Allatoona"},
  {lat: 33.95, lon: -84.35, name: "Chattahoochee River"}
];

/* ---------------- MAP ---------------- */
function initMap() {
  map = new maplibregl.Map({
    container: "map",
    style: {
      version: 8,
      sources: {
        base: {
          type: "raster",
          tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
          tileSize: 256
        }
      },
      layers: [{ id: "base", type: "raster", source: "base" }]
    },
    center: [lon, lat],
    zoom: 10
  });

  renderMarkers();
}

function renderMarkers() {
  document.querySelectorAll(".mk").forEach(e => e.remove());

  const all = [
    {lat, lon, name: currentPlaceName, color:"#22c55e"},
    ...hotspots,
    ...savedSpots
  ];

  all.forEach(p => {
    const el = document.createElement("div");
    el.className = "mk";
    el.innerHTML = "🎣";

    new maplibregl.Marker({ element: el })
      .setLngLat([p.lon, p.lat])
      .setPopup(new maplibregl.Popup().setText(p.name))
      .addTo(map);
  });
}

/* ---------------- RADAR ---------------- */
function toggleRadar() {
  if (radarLayer) {
    map.removeLayer("radar");
    map.removeSource("radar");
    radarLayer = null;
    return;
  }

  const ts = Math.floor(Date.now()/1000/300)*300;

  map.addSource("radar", {
    type: "raster",
    tiles: [
      `https://tilecache.rainviewer.com/v2/radar/${ts}/256/{z}/{x}/{y}/2/1_1.png`
    ],
    tileSize: 256
  });

  map.addLayer({
    id: "radar",
    type: "raster",
    source: "radar",
    paint: { "raster-opacity": 0.55 }
  });

  radarLayer = true;
}

/* ---------------- LOCATION ---------------- */
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    currentPlaceName = "You";

    map.setCenter([lon, lat]);
    fetchWeather();
    renderMarkers();
  });
}

async function searchLocation() {
  const q = document.getElementById("search-input").value;

  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}`);
  const data = await res.json();

  let html = "";
  data.results.forEach(p => {
    html += `
      <div onclick="selectPlace(${p.latitude},${p.longitude},'${p.name}')"
        class="p-2 hover:bg-zinc-800 cursor-pointer">
        ${p.name}
      </div>`;
  });

  document.getElementById("search-results").innerHTML = html;
}

function selectPlace(a,b,name) {
  lat = a;
  lon = b;
  currentPlaceName = name;

  map.setCenter([lon, lat]);
  fetchWeather();
  renderMarkers();
}

/* ---------------- WEATHER ---------------- */
async function fetchWeather() {
  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,precipitation,cloud_cover`
  );

  const data = await res.json();
  const c = data.current;

  const score = fishingScore(c);
  const species = speciesScore(c);
  const decision = getDecision(score);

  document.getElementById("current-weather").innerHTML = `
    <div class="text-4xl font-light">${Math.round(c.temperature_2m)}°F</div>
    <div class="text-sm opacity-70">Wind ${c.wind_speed_10m} mph • Rain ${c.precipitation}</div>
  `;

  document.getElementById("fishing-activity").innerHTML = `
    <div class="text-xl mb-2">Fishing Score</div>
    <div class="text-6xl font-bold">${score}</div>
  `;

  document.getElementById("species-panel").innerHTML = `
    <div class="text-xl mb-2">Species Odds</div>
    <div>🎣 Bass: ${species.bass}%</div>
    <div>🐟 Trout: ${species.trout}%</div>
    <div>🐠 Panfish: ${species.panfish}%</div>
  `;

  document.getElementById("decision-panel").innerHTML = `
    <div class="text-3xl font-bold">${decision.text}</div>
    <div class="text-sm opacity-70 mt-2">${decision.reason}</div>
  `;
}

/* ---------------- AI SCORING ---------------- */
function fishingScore(c) {
  let score = 50;

  if (c.wind_speed_10m < 6) score += 25;
  else if (c.wind_speed_10m < 10) score += 15;
  else if (c.wind_speed_10m > 18) score -= 25;

  if (c.precipitation === 0) score += 10;
  else if (c.precipitation < 0.1) score += 20;
  else score -= 20;

  if (c.temperature_2m >= 60 && c.temperature_2m <= 82) score += 20;

  if (c.cloud_cover > 40 && c.cloud_cover < 80) score += 10;

  const hour = new Date().getHours();
  if (hour >= 5 && hour <= 9) score += 10;
  if (hour >= 17 && hour <= 21) score += 10;

  return Math.max(10, Math.min(100, score));
}

/* ---------------- SPECIES MODEL ---------------- */
function speciesScore(c) {
  return {
    bass: Math.round(50 + (c.temperature_2m > 65 ? 25 : -10)),
    trout: Math.round(50 + (c.temperature_2m < 65 ? 25 : -20)),
    panfish: Math.round(50 + (c.cloud_cover > 40 ? 15 : 5))
  };
}

/* ---------------- DECISION ENGINE ---------------- */
function getDecision(score) {
  if (score >= 75) return {text:"🔥 GO NOW", reason:"Excellent bite conditions"};
  if (score >= 55) return {text:"🟡 POSSIBLE", reason:"Mixed conditions"};
  return {text:"🔴 SKIP", reason:"Low activity"};
}

window.onload = () => {
  initMap();
  fetchWeather();
};
</script>

</body>
</html>
