<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FishCast • Weather + Fishing Forecast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: all 0.3s; }
    .day-card { transition: all 0.2s; }
    .day-card:hover { transform: scale(1.03); }
    .fish-icon { transition: all 0.2s; }
    #map { height: 420px; border-radius: 1.5rem; }
    .modal { animation: modalPop 0.3s ease; }
    @keyframes modalPop { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12">
  <div class="max-w-xl mx-auto px-4">
    <header class="py-8 flex items-center justify-between">
      <h1 class="text-3xl font-bold flex items-center gap-2">
        <i class="fa-solid fa-fish text-emerald-400"></i> FishCast
      </h1>
      <button onclick="getLocation()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl flex items-center gap-2 text-sm">
        <i class="fa-solid fa-location-dot"></i> My Location
      </button>
    </header>

    <!-- Interactive Map with Radar & Hotspots -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-3 flex items-center gap-2"><i class="fa-solid fa-map"></i> Radar & Fishing Hotspots</h2>
      <div id="map"></div>
      <div class="flex gap-2 mt-3 text-xs">
        <button onclick="toggleRadar()" id="radar-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl">Show Radar</button>
        <button onclick="addCurrentSpot()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-2 rounded-xl">Save This Spot</button>
      </div>
    </div>

    <!-- Location Search -->
    <div class="mb-6">
      <div class="flex gap-2">
        <input id="search-input" type="text" placeholder="Search city or fishing spot (Atlanta, Lake Lanier...)" 
               class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500">
        <button onclick="searchLocation()" class="bg-white text-black px-6 rounded-2xl font-medium flex items-center gap-2">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
      <div id="search-results" class="mt-2 hidden bg-zinc-900 rounded-3xl p-2 max-h-80 overflow-auto"></div>
    </div>

    <div id="location-info" class="mb-6 text-sm text-zinc-400 flex items-center gap-2"></div>

    <div class="flex gap-3 mb-8 text-xs opacity-75">
      <input id="lat" type="text" placeholder="Lat" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
      <input id="lon" type="text" placeholder="Lon" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
      <button onclick="fetchAllData()" class="bg-emerald-600 hover:bg-emerald-500 px-6 rounded-2xl">Go</button>
    </div>

    <!-- Current Weather -->
    <div id="current-weather" class="card bg-zinc-900 rounded-3xl p-6 mb-6"></div>

    <!-- 7-Day Weather -->
    <div id="seven-day" class="card bg-zinc-900 rounded-3xl p-6 mb-6"></div>

    <!-- 7-Day Fish Activity Rating -->
    <div id="fishing-activity" class="card bg-zinc-900 rounded-3xl p-6 mb-6"></div>

    <!-- Solunar -->
    <div id="solunar" class="card bg-zinc-900 rounded-3xl p-6 mb-6"></div>

    <!-- Tides -->
    <div id="tides" class="card bg-zinc-900 rounded-3xl p-6 hidden"></div>

    <!-- Overall Rating -->
    <div id="rating" class="card bg-gradient-to-r from-emerald-500 to-teal-500 rounded-3xl p-6 text-center"></div>
  </div>

  <!-- Day Detail Modal -->
  <div id="day-detail-modal" onclick="if(event.target.id === 'day-detail-modal') closeModal()" 
       class="hidden fixed inset-0 bg-black/80 z-50 flex items-end">
    <div onclick="event.stopImmediatePropagation()" 
         class="modal bg-zinc-900 w-full max-w-xl mx-auto rounded-t-3xl p-6 max-h-[90vh] overflow-auto">
      <div class="flex justify-between items-center mb-6 sticky top-0 bg-zinc-900 pb-4 border-b border-zinc-700">
        <h2 id="modal-date-title" class="text-2xl font-semibold"></h2>
        <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">✕</button>
      </div>
      <div id="modal-summary" class="grid grid-cols-3 gap-4 mb-8"></div>
      <h3 class="text-lg font-semibold mb-3 flex items-center gap-2"><i class="fa-solid fa-chart-bar"></i> Hour-by-Hour Fish Activity</h3>
      <div id="hourly-graph" class="bg-zinc-800 rounded-3xl p-4 mb-8"></div>
      <h3 class="text-lg font-semibold mb-3">Hourly Breakdown</h3>
      <div id="hourly-list" class="space-y-3"></div>
    </div>
  </div>

  <script>
    let lat = 33.75;
    let lon = -84.39;
    let currentPlaceName = "Atlanta, GA";
    let fullWeatherData = null;
    let map, radarLayer;
    let hotspots = [];

    // Pre-loaded popular fishing hotspots near Atlanta / Georgia
    const defaultHotspots = [
      {lat: 34.15, lon: -84.05, name: "Lake Lanier"},
      {lat: 34.17, lon: -84.12, name: "Lake Lanier - Buford Dam"},
      {lat: 33.95, lon: -84.35, name: "Chattahoochee River - Morgan Falls"},
      {lat: 33.80, lon: -84.65, name: "Sweetwater Creek State Park"},
      {lat: 33.65, lon: -84.50, name: "George H. Sparks Reservoir"},
      {lat: 34.05, lon: -84.70, name: "Lake Allatoona"},
      {lat: 33.92, lon: -84.28, name: "Chattahoochee River - Jones Bridge"},
      {lat: 33.75, lon: -84.39, name: "Atlanta - Central"}
    ];

    function initMap() {
      map = L.map('map').setView([lat, lon], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      // Add default fishing hotspots
      defaultHotspots.forEach(spot => {
        L.marker([spot.lat, spot.lon], {
          icon: L.divIcon({ className: 'text-3xl', html: '🎣' })
        }).addTo(map)
          .bindPopup(`<b>${spot.name}</b><br>Popular Fishing Spot`);
      });

      L.marker([lat, lon]).addTo(map).bindPopup(`<b>${currentPlaceName}</b><br>Your Location`).openPopup();
      loadHotspots();
    }

    function toggleRadar() {
      const btn = document.getElementById('radar-btn');
      if (radarLayer) {
        map.removeLayer(radarLayer);
        radarLayer = null;
        btn.textContent = "Show Radar";
      } else {
        const timestamp = Math.floor(Date.now() / 1000 / 300) * 300;
        radarLayer = L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/${timestamp}/256/{z}/{x}/{y}/2/1_1.png`, {
          opacity: 0.65,
          attribution: 'Radar: RainViewer'
        }).addTo(map);
        btn.textContent = "Hide Radar";
      }
    }

    function addCurrentSpot() {
      const name = prompt("Name this fishing spot:", currentPlaceName);
      if (!name) return;
      hotspots.push({lat: parseFloat(lat), lon: parseFloat(lon), name: name});
      saveHotspots();
      renderHotspots();
      alert("Spot saved successfully!");
    }

    function saveHotspots() {
      localStorage.setItem('fishcast_hotspots', JSON.stringify(hotspots));
    }

    function loadHotspots() {
      const saved = localStorage.getItem('fishcast_hotspots');
      if (saved) hotspots = JSON.parse(saved);
      renderHotspots();
    }

    function renderHotspots() {
      hotspots.forEach(spot => {
        L.marker([spot.lat, spot.lon]).addTo(map)
          .bindPopup(`<b>${spot.name}</b><br>Your Saved Hotspot`);
      });
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          lat = pos.coords.latitude.toFixed(2);
          lon = pos.coords.longitude.toFixed(2);
          currentPlaceName = "Your Location";
          document.getElementById('lat').value = lat;
          document.getElementById('lon').value = lon;
          fetchAllData();
        });
      }
    }

    async function searchLocation() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      const resultsDiv = document.getElementById('search-results');
      resultsDiv.classList.remove('hidden');
      resultsDiv.innerHTML = `<div class="px-4 py-3 text-zinc-400">Searching...</div>`;
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=en&format=json`);
        const data = await res.json();
        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = `<div class="px-4 py-3 text-red-400">No locations found.</div>`;
          return;
        }
        let html = `<div class="text-xs text-zinc-400 px-4 py-2">Select a location:</div>`;
        data.results.forEach(place => {
          html += `
            <button onclick="selectPlace(${place.latitude}, ${place.longitude}, '${place.name}, ${place.admin1 || place.country}')" 
                    class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-2xl flex justify-between items-center">
              <span>${place.name}, ${place.admin1 || place.country}</span>
              <span class="text-emerald-400 text-xs">${place.latitude.toFixed(2)}, ${place.longitude.toFixed(2)}</span>
            </button>`;
        });
        resultsDiv.innerHTML = html;
      } catch(e) {
        resultsDiv.innerHTML = `<div class="px-4 py-3 text-red-400">Search failed.</div>`;
      }
    }

    function selectPlace(newLat, newLon, name) {
      lat = newLat.toFixed(2);
      lon = newLon.toFixed(2);
      currentPlaceName = name;
      document.getElementById('search-results').classList.add('hidden');
      document.getElementById('search-input').value = '';
      document.getElementById('lat').value = lat;
      document.getElementById('lon').value = lon;
      fetchAllData();
    }

    async function fetchAllData() {
      const inputLat = document.getElementById('lat').value;
      const inputLon = document.getElementById('lon').value;
      if (inputLat) lat = parseFloat(inputLat).toFixed(2);
      if (inputLon) lon = parseFloat(inputLon).toFixed(2);

      document.getElementById('location-info').innerHTML = `📍 <span class="font-medium">${currentPlaceName}</span> <span class="text-xs opacity-50">(${lat}, ${lon})</span>`;

      const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,precipitation,cloud_cover,relative_humidity_2m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&hourly=temperature_2m,wind_speed_10m,precipitation,cloud_cover,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=8`;
      
      const wRes = await fetch(weatherUrl);
      fullWeatherData = await wRes.json();

      let solunar = {};
      try {
        const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
        const tzOffset = Math.round(new Date().getTimezoneOffset() / 60) * -1;
        const sRes = await fetch(`https://api.solunar.org/solunar/${lat},${lon},${today},${tzOffset}`);
        solunar = await sRes.json();
      } catch(e) {}

      renderCurrentWeather(fullWeatherData);
      renderSevenDayWeather(fullWeatherData);
      renderFishingActivity(fullWeatherData);
      renderSolunar(solunar);
      renderRating(fullWeatherData);
    }

    function renderCurrentWeather(data) {
      const c = data.current;
      document.getElementById('current-weather').innerHTML = `
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-cloud-sun"></i> Now • ${currentPlaceName}</h2>
        <div class="flex justify-between items-start">
          <div><span class="text-6xl font-light">${Math.round(c.temperature_2m)}°F</span></div>
          <div class="text-right">
            <p><i class="fa-solid fa-wind"></i> ${c.wind_speed_10m} mph</p>
            <p><i class="fa-solid fa-cloud-rain"></i> ${c.precipitation} in</p>
            <p><i class="fa-solid fa-cloud"></i> ${c.cloud_cover}% clouds</p>
          </div>
        </div>`;
    }

    function renderSevenDayWeather(data) {
      let html = `<h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-calendar"></i> 7-Day Weather</h2><div class="grid grid-cols-7 gap-2">`;
      data.daily.time.forEach((date, i) => {
        if (i === 0) return;
        const dayName = new Date(date).toLocaleDateString('en-US', {weekday: 'short'});
        html += `<div class="day-card bg-zinc-800/70 rounded-2xl p-2 text-center text-xs"><div class="font-medium">${dayName}</div><div class="text-lg font-light my-1">${Math.round(data.daily.temperature_2m_max[i])}° <span class="text-zinc-400">${Math.round(data.daily.temperature_2m_min[i])}°</span></div><div class="text-emerald-300">${data.daily.precipitation_sum[i].toFixed(1)}"</div></div>`;
      });
      html += `</div>`;
      document.getElementById('seven-day').innerHTML = html;
    }

    function getHourlyFishingScore(h) {
      let score = 40;
      if (h.wind_speed_10m < 8) score += 30;
      else if (h.wind_speed_10m < 12) score += 15;
      if (h.precipitation < 0.05) score += 30;
      else if (h.precipitation < 0.2) score += 10;
      if (h.temperature_2m > 52 && h.temperature_2m < 88) score += 18;
      return Math.min(100, Math.max(25, score));
    }

    function renderFishingActivity(data) {
      let html = `<h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-fish"></i> 7-Day Fish Activity Rating</h2><p class="text-xs text-zinc-400 mb-4">Tap any day for hourly details</p><div class="space-y-3">`;
      data.daily.time.forEach((dateStr, i) => {
        const dayName = new Date(dateStr).toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'});
        const wind = data.daily.wind_speed_10m_max[i];
        const precip = data.daily.precipitation_sum[i];
        const tempMax = data.daily.temperature_2m_max[i];
        let score = 40;
        if (wind < 8) score += 25; else if (wind < 12) score += 12;
        if (precip < 0.05) score += 30; else if (precip < 0.2) score += 10;
        if (tempMax > 52 && tempMax < 88) score += 18;
        score = Math.min(100, Math.max(25, score));
        let fishCount = score >= 85 ? 4 : score >= 70 ? 3 : score >= 50 ? 2 : 1;
        let fishIcons = '';
        for (let k = 1; k <= 4; k++) fishIcons += `<i class="fa-solid fa-fish text-3xl ${k <= fishCount ? 'text-emerald-400' : 'text-zinc-600'}"></i>`;
        html += `<div onclick="showDayDetail(${i})" class="day-card cursor-pointer flex items-center justify-between bg-zinc-800/70 rounded-2xl px-4 py-3"><div class="font-medium w-20">${dayName}</div><div class="flex gap-1">${fishIcons}</div><div class="text-right"><div class="text-sm font-medium">${fishCount === 4 ? 'Excellent' : fishCount === 3 ? 'Good' : fishCount === 2 ? 'Fair' : 'Poor'}</div><div class="text-xs text-zinc-400">${Math.round(score)}</div></div></div>`;
      });
      html += `</div>`;
      document.getElementById('fishing-activity').innerHTML = html;
    }

    function showDayDetail(dayIndex) {
      const data = fullWeatherData;
      const dateObj = new Date(data.daily.time[dayIndex]);
      document.getElementById('modal-date-title').innerHTML = dateObj.toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric'});

      document.getElementById('modal-summary').innerHTML = `
        <div class="bg-zinc-800 rounded-2xl p-3 text-center"><div class="text-xs text-zinc-400">HIGH</div><div class="text-2xl">${Math.round(data.daily.temperature_2m_max[dayIndex])}°F</div></div>
        <div class="bg-zinc-800 rounded-2xl p-3 text-center"><div class="text-xs text-zinc-400">LOW</div><div class="text-2xl">${Math.round(data.daily.temperature_2m_min[dayIndex])}°F</div></div>
        <div class="bg-zinc-800 rounded-2xl p-3 text-center"><div class="text-xs text-zinc-400">RAIN</div><div class="text-2xl">${data.daily.precipitation_sum[dayIndex].toFixed(1)}"</div></div>`;

      const hourlyTimes = data.hourly.time;
      let dayHours = [];
      for (let i = 0; i < hourlyTimes.length; i++) {
        if (hourlyTimes[i].startsWith(data.daily.time[dayIndex])) {
          const h = {
            time: hourlyTimes[i].slice(11,16),
            temp: data.hourly.temperature_2m[i],
            wind: data.hourly.wind_speed_10m[i],
            precip: data.hourly.precipitation[i],
            score: getHourlyFishingScore({wind_speed_10m: data.hourly.wind_speed_10m[i], precipitation: data.hourly.precipitation[i], temperature_2m: data.hourly.temperature_2m[i]})
          };
          dayHours.push(h);
        }
      }

      let graphHTML = `<div class="flex flex-col gap-3">`;
      dayHours.forEach(h => {
        const fishCount = h.score >= 85 ? 4 : h.score >= 70 ? 3 : h.score >= 50 ? 2 : 1;
        let fishMini = '';
        for (let k = 1; k <= 4; k++) fishMini += `<i class="fa-solid fa-fish text-xl ${k <= fishCount ? 'text-emerald-400' : 'text-zinc-600'}"></i>`;
        graphHTML += `<div class="flex items-center gap-3 text-xs"><div class="w-12">${h.time}</div><div class="flex-1 h-3 bg-zinc-700 rounded-full overflow-hidden"><div class="h-3 bg-gradient-to-r from-emerald-400 to-teal-400" style="width:${Math.max(10, h.score)}%"></div></div><div class="flex gap-px">${fishMini}</div><div class="w-8 text-right">${Math.round(h.score)}</div></div>`;
      });
      graphHTML += `</div>`;
      document.getElementById('hourly-graph').innerHTML = graphHTML;

      let listHTML = '';
      dayHours.forEach(h => {
        const fishCount = h.score >= 85 ? 4 : h.score >= 70 ? 3 : h.score >= 50 ? 2 : 1;
        let fishIcons = '';
        for (let k = 1; k <= 4; k++) fishIcons += `<i class="fa-solid fa-fish ${k <= fishCount ? 'text-emerald-400' : 'text-zinc-600'}"></i>`;
        listHTML += `<div class="flex justify-between bg-zinc-800/70 rounded-2xl px-4 py-3 text-sm"><div>${h.time}</div><div>${Math.round(h.temp)}°F • ${h.wind} mph • ${h.precip}"</div><div class="flex gap-1">${fishIcons}</div></div>`;
      });
      document.getElementById('hourly-list').innerHTML = listHTML;

      document.getElementById('day-detail-modal').classList.remove('hidden');
      document.getElementById('day-detail-modal').classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('day-detail-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function renderSolunar(data) {
      const major = data.major_start ? `${data.major_start}–${data.major_end}` : '—';
      const minor = data.minor_start ? `${data.minor_start}–${data.minor_end}` : '—';
      document.getElementById('solunar').innerHTML = `
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-moon"></i> Best Bite Times Today</h2>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-zinc-800 rounded-2xl p-4"><p class="text-emerald-400 text-xs">MAJOR</p><p class="text-2xl font-light">${major}</p></div>
          <div class="bg-zinc-800 rounded-2xl p-4"><p class="text-amber-300 text-xs">MINOR</p><p class="text-2xl font-light">${minor}</p></div>
        </div>`;
    }

    function renderRating(data) {
      let score = 75;
      const wind = data.current.wind_speed_10m;
      const precip = data.current.precipitation;
      if (wind > 15) score -= 35;
      if (precip > 0.2) score -= 40;
      const emoji = score > 80 ? '🔥 Excellent bite!' : score > 60 ? '👍 Good conditions' : '🟡 Fair';
      document.getElementById('rating').innerHTML = `
        <div class="text-7xl font-bold">${Math.round(score)}</div>
        <p class="text-2xl mt-2">Today's Fishing Rating</p>
        <p class="mt-3 text-emerald-100">${emoji}</p>`;
    }

    window.onload = () => {
      document.getElementById('lat').value = lat;
      document.getElementById('lon').value = lon;
      initMap();
      fetchAllData();
    };
  </script>
</body>
</html>
